<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <style>
      .brand-blue { stroke: #1a2e6b; fill: none; stroke-width: 2.8; stroke-linecap: round; }
      .brand-green { stroke: #7a8c3a; fill: none; stroke-width: 2.5; stroke-linecap: round; }
      .brand-gold { stroke: #d4af37; fill: none; stroke-width: 2.2; stroke-linecap: round; }
      .brand-text { fill: #1a2e6b; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 46px; font-weight: 800; letter-spacing: -1.6px; }
    </style>
  </defs>
  
  <g transform="translate(10, 5) scale(1.05)">
    <!-- Main figures - Professional fluid paths -->
    <g class="brand-blue">
      <circle cx="50" cy="20" r="6.5" />
      <path d="M50 28 L50 58 M50 58 L38 78 M50 58 L62 78" />
      <path d="M36 38 C42 28, 58 28, 64 38" />
    </g>
    
    <g class="brand-green">
      <circle cx="28" cy="35" r="5.5" />
      <path d="M28 42 L28 68 M28 68 L18 88 M28 68 L38 88" />
      <path d="M14 52 C20 42, 36 42, 42 52" />
    </g>
    
    <!-- Official Branding Swoosh -->
    <path d="M5 75 Q35 95, 75 65" class="brand-gold" />
    
    <!-- Star accent from original logo.svg - modernized decoration -->
    <path d="M50,5 Q52,10 57,12 Q52,14 50,19 Q48,14 43,12 Q48,10 50,5" fill="#d4af37" opacity="0.4" />
  </g>
  
  <text x="110" y="68" class="brand-text">Aydence</text>
</svg>
